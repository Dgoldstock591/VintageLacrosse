<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Vintage Shaft Deal Tracker</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="wrap">
    <header class="hero">
      <div>
        <h1>Vintage Shaft Deal Tracker</h1>
        <p>Auto-updating dashboard tuned for rare, profitable, resaleable vintage lacrosse shafts.</p>
      </div>
      <div class="meta" id="meta">Loading status…</div>
    </header>

    <section class="leaderboardPanel">
      <div>
        <h2>Best deals right now</h2>
        <p>Ranked by rarity, expected resale spread, price target, and condition language.</p>
      </div>
      <div id="leaderboard" class="leaderboard"></div>
    </section>

    <section class="controls">
      <input id="searchBox" type="search" placeholder="Filter listings…" />
      <select id="sourceFilter">
        <option value="">All sources</option>
      </select>
      <select id="modelFilter">
        <option value="">All target models</option>
      </select>
      <select id="priceFilter">
        <option value="">Any price</option>
        <option value="40">Under $40</option>
        <option value="60">Under $60</option>
        <option value="80">Under $80</option>
        <option value="100">Under $100</option>
        <option value="140">Under $140</option>
      </select>
      <label class="toggle"><input id="newOnly" type="checkbox" /> New only</label>
      <label class="toggle"><input id="collectibleOnly" type="checkbox" /> Collectible only</label>
      <label class="toggle"><input id="profitableOnly" type="checkbox" checked /> Profit spread only</label>
    </section>

    <main>
      <div id="summary" class="summary"></div>
      <div id="listings" class="grid"></div>
    </main>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
